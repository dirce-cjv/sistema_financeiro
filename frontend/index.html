<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Importador de Despesas</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Importacao de Despesas</h1>
        <p>Selecione um arquivo Excel com as colunas: Data, Descrição, Valor.</p>

        <form id="import-form">
          <input
            id="excel-file"
            type="file"
            name="file"
            accept=".xlsx,.xls"
            required
          />
          <button id="submit-button" type="submit">Importar para Google Sheets</button>
        </form>

        <div id="status" class="status"></div>

        <hr class="divider" />

        <h2 class="subtitle">Categorizacao automatica (Gemini)</h2>
        <p class="hint">
          Classifica linhas da planilha em que a coluna Categoria esta vazia, usando a Descricao.
        </p>
        <button id="categorize-button" type="button">
          Categorizar linhas sem categoria
        </button>
        <div id="categorize-status" class="status"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
